name: 🐛 Bug report
description: Report something that isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting! Please do NOT include face images or personal data.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Do ...
        3. See error
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options: [backend, liveness, kiosk, dashboard, compreface, deployment/compose, other]
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant log output (scrub secrets).
      render: shell
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "OS, Docker version, browser/phone model"
